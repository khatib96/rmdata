# Add this inside the existing server block for api.rmdata.tech
# Keep PHP routes active, and introduce Node under /node-api/ first.
# In phase 0.6 use endpoint-level canary only; do not move /api/files/upload
# to Node until parity is complete.
#
# Mapping: /node-api/<suffix> -> upstream /api/<suffix>
# Examples:
#   /node-api/health        -> http://127.0.0.1:3001/api/health
#   /node-api/auth/login    -> http://127.0.0.1:3001/api/auth/login
#   /node-api/db/query      -> http://127.0.0.1:3001/api/db/query
#
# Canary step 1 (low risk): route only /api/health to Node.
# Keep this location ABOVE the generic PHP /api location in your Nginx server block.
# Rollback: remove/comment this location and reload Nginx.

location = /api/health {
    proxy_pass http://127.0.0.1:3001/api/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_read_timeout 30s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;
}

location /node-api/ {
    proxy_pass http://127.0.0.1:3001/api/;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Prefix /node-api;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_read_timeout 120s;
    proxy_connect_timeout 30s;
    proxy_send_timeout 120s;
}
