<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>نظام إدارة الرداء الموحد</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.addEventListener('error', function(e) {
        console.error('Uncaught error:', e.message, e.filename, e.lineno, e.colno);
        var root = document.getElementById('root');
        if (root && root.innerHTML === '') {
          root.textContent = '';
          var wrap = document.createElement('div');
          wrap.style.cssText = 'padding:2rem;font-family:sans-serif;direction:rtl';
          var h1 = document.createElement('h1');
          h1.textContent = 'خطأ في تحميل التطبيق';
          var pre = document.createElement('pre');
          pre.style.cssText = 'background:#f0f0f0;padding:1rem;overflow:auto';
          pre.textContent = e.message || '';
          var p = document.createElement('p');
          p.textContent = 'تحقق من Console (F12) للمزيد';
          wrap.appendChild(h1);
          wrap.appendChild(pre);
          wrap.appendChild(p);
          root.appendChild(wrap);
        }
      });
      window.addEventListener('unhandledrejection', function(e) {
        console.error('Unhandled promise rejection:', e.reason);
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
